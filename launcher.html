<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаунчер Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-browse {
            background: #f0f0f0;
            color: #333;
        }

        .btn-browse:hover {
            background: #e0e0e0;
        }

        .btn-launch {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-launch:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-launch:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
            display: block;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #2196f3;
            display: block;
        }

        .recent-files {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .recent-files h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .file-item {
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .file-path {
            font-size: 13px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .file-launch-btn {
            padding: 5px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }

        .file-launch-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ Лаунчер Minecraft</h1>
            <p>Выберите или укажите путь к Minecraft</p>
        </div>

        <div class="form-group">
            <label for="filepath">Путь к файлу:</label>
            <div class="input-group">
                <input type="text" id="filepath" placeholder="Нажмите 'Выбрать файл'" readonly>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-browse" onclick="browseFile()">📁 Выбрать файл</button>
            <button class="btn-launch" id="launchBtn" onclick="launchGame()" disabled>▶️ Запустить</button>
        </div>

        <div id="status" class="status"></div>

        <div class="recent-files" id="recentContainer" style="display: none;">
            <h3>📋 Недавние файлы:</h3>
            <div id="recentList"></div>
        </div>
    </div>

    <script>
        // Load recent files from localStorage
        function loadRecentFiles() {
            const recent = JSON.parse(localStorage.getItem('recentFiles') || '[]');
            updateRecentFilesUI(recent);
        }

        // Save file to recent files
        function saveRecentFile(filePath) {
            let recent = JSON.parse(localStorage.getItem('recentFiles') || '[]');
            recent = recent.filter(f => f !== filePath);
            recent.unshift(filePath);
            recent = recent.slice(0, 5); // Keep only 5 recent
            localStorage.setItem('recentFiles', JSON.stringify(recent));
            updateRecentFilesUI(recent);
        }

        // Update recent files UI
        function updateRecentFilesUI(recent) {
            const container = document.getElementById('recentContainer');
            const list = document.getElementById('recentList');
            
            if (recent.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            list.innerHTML = '';

            recent.forEach(filePath => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <span class="file-path">${filePath}</span>
                    <button class="file-launch-btn" onclick="quickLaunch('${filePath}')">Запустить</button>
                `;
                list.appendChild(div);
            });
        }

        // Browse for file
        function browseFile() {
            showStatus('info', '📂 На не-электронной версии используйте ввод пути и автодетект');
            // In a real web app, you'd need a backend or file dialog API
            const path = prompt('Введите полный путь к Minecraft:');
            if (path) {
                document.getElementById('filepath').value = path;
                document.getElementById('launchBtn').disabled = false;
            }
        }

        // Launch game
        function launchGame() {
            const filepath = document.getElementById('filepath').value;
            if (!filepath) {
                showStatus('error', '❌ Укажите путь к файлу');
                return;
            }

            showStatus('info', '⏳ Запуск ' + filepath.split('/').pop() + '...');
            saveRecentFile(filepath);

            // Simulate launch (actual execution depends on backend)
            setTimeout(() => {
                showStatus('success', '✅ Игра запущена успешно!');
                setTimeout(() => {
                    document.getElementById('status').style.display = 'none';
                }, 3000);
            }, 500);
        }

        // Quick launch from recent
        function quickLaunch(filePath) {
            document.getElementById('filepath').value = filePath;
            launchGame();
        }

        // Show status message
        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        // Initialize
        loadRecentFiles();
    </script>
</body>
</html>
